<section class="todo-list">

  @for (todo of todos(); track todo.id) {
    <app-todo-item
      [todo]="todo"
      (toggleTodo)="onToggleTodo($event)"
      (deleteTodo)="onDeleteTodo($event)"
      (updateTodo)="updateTodoEvent($event)" />
  } @empty {
    <!-- BOŞ DURUM (eğer liste boşsa bu görünmeli) -->
    <div class="empty-state">
      <div class="empty-icon">📭</div>
      <h3>Henüz todo yok</h3>
      <p>Yukarıdaki formu kullanarak ilk todo'nu ekle!</p>
    </div>
  }

</section>
