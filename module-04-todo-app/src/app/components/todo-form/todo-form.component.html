<section class="todo-form">
  <form (submit)="onsubmit()">
    <input
      type="text"
      placeholder="Yeni todo... (örn: Angular öğren)"
      [value]="title()"
      (input)="onInputChange($event)"
    >
    <select (change)="onSelectChange($event)">
      @for (priority of priorityOptions(); track priority.key) {
        <option [value]="priority.key" [selected]="priority.key === selectedPriority()" >{{ priority.value }}</option>
      }
    </select>
    <button type="submit" class="btn-primary">
      <span class="icon">+</span> Ekle
    </button>
  </form>
</section>
