<main style="text-align: center; padding: 4rem; font-family: sans-serif;">
  <h1 style="font-size: 3rem; color: #dd0031;">🎉 Merhaba Angular v21!</h1>
  <p style="font-size: 1.2rem; color: #666;">
    Bu benim ilk Angular uygulamam.
  </p>
  <button
    style="margin-top: 2rem; padding: 1rem 2rem; font-size: 1rem; cursor: pointer;"

  </button>
</main>
