<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reactive Filter & Search</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!--
    Reactive Filter & Search — STATİK referans (JS YOK).
    Liste içeriği, düzeni göstermek için elle (hardcoded) yazılmıştır.
    Angular'da bunu signal + computed ile dinamik yapacaksın (mantık sende).

    Önerilen bölme:
      • Bütün <div class="filter-card"> .........  ProductSearch (parent) component
      • <li class="result-item"> bloğu ..........  ProductItem (child) component (opsiyonel)
  -->
  <main class="page">

    <!-- ===== ProductSearch (parent) ===== -->
    <div class="filter-card">

      <!-- Başlık -->
      <header class="filter-header">
        <h1>Ürün Arama</h1>
        <p class="subtitle">Ada göre ara, kategoriye göre süz.</p>
      </header>

      <!-- Arama + kategori filtresi -->
      <div class="filter-controls">
        <input
          class="search-input"
          type="text"
          placeholder="Ürün ara..."
          value="kahve" />
        <select class="category-select">
          <option>Tüm kategoriler</option>
          <option selected>İçecek</option>
          <option>Atıştırmalık</option>
          <option>Kahvaltılık</option>
        </select>
      </div>

      <!-- Sonuç sayısı -->
      <p class="result-meta">2 sonuç bulundu</p>

      <!-- Sonuç listesi -->
      <ul class="result-list">
        <li class="result-item">
          <span class="item-name">Filtre Kahve</span>
          <span class="item-category">İçecek</span>
          <span class="item-price">45 ₺</span>
        </li>
        <li class="result-item">
          <span class="item-name">Soğuk Kahve</span>
          <span class="item-category">İçecek</span>
          <span class="item-price">60 ₺</span>
        </li>
      </ul>

    </div>
    <!-- ===== /ProductSearch ===== -->

  </main>
</body>
</html>
